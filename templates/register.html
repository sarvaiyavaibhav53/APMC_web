<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APMC - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        @keyframes gradientBG {
            0% {
                background-position: 0% 50%
            }

            50% {
                background-position: 100% 50%
            }

            100% {
                background-position: 0% 50%
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(25px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes pageLoader {
            0% {
                width: 0%
            }

            100% {
                width: 100%
            }
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: 0.2;
                transform: scale(1)
            }

            50% {
                opacity: 1;
                transform: scale(1.3)
            }
        }

        @keyframes floatWheat {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0
            }

            10% {
                opacity: 0.6
            }

            90% {
                opacity: 0.6
            }

            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0
            }
        }

        * {
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(-45deg, #050508, #08080f, #0c0c1a, #10102a);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 16px;
        }

        .page-loader {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            width: 0%;
            background: linear-gradient(90deg, #4f46e5, #818cf8, #34d399);
            animation: pageLoader 1.2s ease forwards;
            z-index: 9999;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #818cf8;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            animation-delay: var(--delay);
        }

        .wheat-particle {
            position: fixed;
            bottom: -50px;
            font-size: var(--size);
            animation: floatWheat var(--duration) linear infinite;
            animation-delay: var(--delay);
            pointer-events: none;
            z-index: 0;
            left: var(--left);
            opacity: 0;
        }

        .register-box {
            background: rgba(99, 102, 241, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.12);
            border-radius: 20px;
            padding: 36px;
            width: 100%;
            max-width: 460px;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.6s ease forwards;
        }

        .register-title {
            font-size: 26px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 6px;
            text-align: center;
        }

        .register-sub {
            color: #64748b;
            font-size: 13px;
            margin-bottom: 28px;
            text-align: center;
        }

        .form-label {
            color: #818cf8;
            font-weight: 500;
            font-size: 13px;
            margin-bottom: 6px;
            display: block;
        }

        .form-control {
            background: rgba(99, 102, 241, 0.07) !important;
            border: 1px solid rgba(99, 102, 241, 0.2) !important;
            color: #ffffff !important;
            border-radius: 10px !important;
            padding: 12px 16px;
            font-size: 14px;
            width: 100%;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(99, 102, 241, 0.12) !important;
            border-color: #818cf8 !important;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15) !important;
            color: #ffffff !important;
            outline: none;
        }

        .form-control::placeholder {
            color: #475569 !important;
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper .form-control {
            padding-right: 45px;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 16px;
            transition: color 0.3s ease;
            padding: 0;
        }

        .toggle-password:hover {
            color: #818cf8;
        }

        .btn-register {
            background: linear-gradient(135deg, #4f46e5, #818cf8);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 700;
            padding: 13px;
            width: 100%;
            font-size: 15px;
            transition: all 0.3s ease;
            margin-top: 6px;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(79, 70, 229, 0.5);
            color: white;
        }

        .divider {
            height: 1px;
            background: rgba(99, 102, 241, 0.1);
            margin: 20px 0;
        }

        .auth-link {
            text-align: center;
            color: #64748b;
            font-size: 14px;
        }

        .auth-link a {
            color: #818cf8;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-link a:hover {
            text-decoration: underline;
        }

        .alert-danger {
            background: rgba(251, 113, 133, 0.08) !important;
            border: 1px solid rgba(251, 113, 133, 0.3) !important;
            color: #fb7185 !important;
            border-radius: 10px !important;
            font-size: 13px;
            padding: 10px 14px;
            margin-bottom: 18px;
        }

        .password-match {
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .match-ok {
            color: #34d399;
        }

        .match-fail {
            color: #fb7185;
        }
    </style>
</head>

<body>
    <div class="page-loader"></div>
    <div class="particles" id="particles"></div>
    <div id="wheat-container"></div>

    <div class="register-box">
        <div class="register-title">🌾 Create Account</div>
        <div class="register-sub">Join APMC Market Information System</div>

        {% if error %}
        <div class="alert-danger">⚠️ {{ error }}</div>
        {% endif %}

        <form method="POST" action="/register" onsubmit="return validateForm()">
            <div class="mb-3">
                <label class="form-label">👤 Username</label>
                <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
            </div>

            <div class="mb-3">
                <label class="form-label">🔒 Password</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="password" class="form-control"
                        placeholder="Create a password" required onkeyup="checkMatch()">
                    <button type="button" class="toggle-password"
                        onclick="togglePassword('password', this)">👁️</button>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">🔒 Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" name="confirm_password" id="confirm_password" class="form-control"
                        placeholder="Repeat your password" required onkeyup="checkMatch()">
                    <button type="button" class="toggle-password"
                        onclick="togglePassword('confirm_password', this)">👁️</button>
                </div>
                <div class="password-match" id="matchMsg"></div>
            </div>

            <button type="submit" class="btn-register">🚀 Create Account</button>
        </form>

        <div class="divider"></div>
        <div class="auth-link">
            Already have an account? <a href="/login">Login here</a>
        </div>
    </div>

    <script>
        // STARS
        const container = document.getElementById('particles');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.cssText = `left:${Math.random() * 100}%;top:${Math.random() * 100}%;--duration:${2 + Math.random() * 4}s;--delay:${Math.random() * 4}s;width:${1 + Math.random() * 2}px;height:${1 + Math.random() * 2}px;`;
            container.appendChild(star);
        }

        // WHEAT
        const wheatContainer = document.getElementById('wheat-container');
        const emojis = ['🌾', '🌿', '🍃', '✨', '🌱'];
        for (let i = 0; i < 12; i++) {
            const w = document.createElement('div');
            w.classList.add('wheat-particle');
            w.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            w.style.cssText = `--left:${Math.random() * 100}%;--size:${12 + Math.random() * 16}px;--duration:${8 + Math.random() * 12}s;--delay:${Math.random() * 10}s;`;
            wheatContainer.appendChild(w);
        }

        // PASSWORD TOGGLE
        function togglePassword(id, btn) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
            btn.textContent = input.type === 'password' ? '👁️' : '🙈';
        }

        // PASSWORD MATCH CHECK
        function checkMatch() {
            const p1 = document.getElementById('password').value;
            const p2 = document.getElementById('confirm_password').value;
            const msg = document.getElementById('matchMsg');
            if (p2.length === 0) { msg.style.display = 'none'; return; }
            msg.style.display = 'block';
            if (p1 === p2) {
                msg.textContent = '✅ Passwords match!';
                msg.className = 'password-match match-ok';
            } else {
                msg.textContent = '❌ Passwords do not match!';
                msg.className = 'password-match match-fail';
            }
        }

        // FORM VALIDATION
        function validateForm() {
            const p1 = document.getElementById('password').value;
            const p2 = document.getElementById('confirm_password').value;
            if (p1 !== p2) {
                alert('Passwords do not match!');
                return false;
            }
            return true;
        }
    </script>
</body>

</html>
